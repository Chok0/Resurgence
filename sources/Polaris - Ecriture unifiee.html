document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"7cae4548-2f54-438b-b6e1-7a6667bd71e5\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <style>/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"afaf4bda-c357-4ee4-8080-c41aa519d505\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"77db30ee-94e8-4302-bba4-af025c149e32\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e6067c11-4388-4c45-ac0d-15a17f52b89a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2d892f1d-1cc6-488a-8daf-da4acf94fb20\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ff777467-b067-4b8e-937e-929874dcf9e4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b363ffd1-da66-44b2-830a-4d897afe3cb5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    * { box-sizing: border-box; }\n    body { margin: 0; background: #e3dccc; }\n    .pf-input::placeholder { color: #c3b9a7; }\n    .pf-input:focus { outline: none; border-color: #b5562a; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:1180px; margin:0 auto; background:#f3eee4; color:#1c1813; font-family:'Helvetica Neue',Arial,sans-serif; padding:54px 64px 60px; border:1px solid #ddd5c6;\">\n\n  <div style=\"display:flex; align-items:flex-end; justify-content:space-between; padding-bottom:18px; border-bottom:1px solid #ddd5c6;\">\n    <div>\n      <div style=\"font-size:20px; font-weight:700; letter-spacing:0.5px;\">RÉSURGENCE · ÉCRITURE DE POLARIS<\u002Fdiv>\n      <div style=\"font-size:12.5px; color:#a79d8e; letter-spacing:0.4px; margin-top:6px;\">Système assemblé — blocs syllabiques, logique hangul · v2<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace; font-size:11px; color:#a79d8e; text-align:right; line-height:1.7;\">latin · cyrillique · hanzi<br>10 consonnes · 6 voyelles<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 00 CHAMP DE TRADUCTION -->\n  <div style=\"margin-top:38px; background:#1c1813; color:#f3eee4; padding:32px 36px 38px; border-radius:2px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:18px;\">\n      <span style=\"font-size:12.5px; font-weight:600; letter-spacing:2.5px; color:#e9b894;\">CHAMP DE TRADUCTION<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:#4a4034;\"><\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace; font-size:10.5px; color:#8a7f6e;\">tape en latin → composition vivante<\u002Fspan>\n    <\u002Fdiv>\n\n    <input class=\"pf-input\" type=\"text\" value=\"{{ text }}\" onchange=\"{{ onType }}\" placeholder=\"polaris, tanya, arkangel…\" style=\"width:100%; background:#2a241c; border:1px solid #4a4034; color:#f3eee4; font-family:'Space Mono',monospace; font-size:18px; letter-spacing:1px; padding:14px 18px; border-radius:2px;\">\n\n    <div style=\"display:flex; flex-wrap:wrap; align-items:flex-end; row-gap:18px; column-gap:{{ blockGap }}px; margin-top:30px; min-height:130px;\">\n      <sc-for list=\"{{ blocks }}\" as=\"b\" hint-placeholder-count=\"3\">\n        <sc-if value=\"{{ b.space }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"width:{{ wordGap }}px;\"><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ b.paths }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; gap:9px;\">\n            <svg viewBox=\"{{ b.vb }}\" width=\"{{ b.w }}\" height=\"100\" style=\"overflow:visible;\">\n              <g fill=\"none\" stroke=\"#f3eee4\" stroke-width=\"{{ weight }}\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                <sc-for list=\"{{ b.paths }}\" as=\"p\" hint-placeholder-count=\"2\">\n                  <g transform=\"{{ p.t }}\"><path d=\"{{ p.d }}\"><\u002Fpath><\u002Fg>\n                <\u002Fsc-for>\n              <\u002Fg>\n            <\u002Fsvg>\n            <span style=\"font-family:'Space Mono',monospace; font-size:11px; color:#8a7f6e;\">{{ b.lab }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 01 INVENTAIRE -->\n  <div style=\"margin-top:48px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:26px;\">\n      <span style=\"font-size:12.5px; font-weight:600; letter-spacing:2.5px;\">01 — L'INVENTAIRE<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:#ddd5c6;\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'Space Mono',monospace; font-size:11px; color:#a79d8e; letter-spacing:1.5px; margin-bottom:14px;\">CONSONNES — fûts verticaux, squelettes latin/cyrillique<\u002Fdiv>\n    <div style=\"display:flex; flex-wrap:wrap; margin-bottom:34px;\">\n      <sc-for list=\"{{ consonants }}\" as=\"g\" hint-placeholder-count=\"10\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:10px; width:105px;\">\n          <svg viewBox=\"0 0 100 100\" width=\"62\" height=\"62\" style=\"overflow:visible;\">\n            <g fill=\"none\" stroke=\"#1c1813\" stroke-width=\"{{ weight }}\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ g.d }}\"><\u002Fpath><\u002Fg>\n          <\u002Fsvg>\n          <span style=\"font-family:'Space Mono',monospace; font-size:12px; color:#a79d8e;\">{{ g.lab }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'Space Mono',monospace; font-size:11px; color:#a79d8e; letter-spacing:1.5px; margin-bottom:14px;\">VOYELLES — un axe, une marque (la position du tic = le son)<\u002Fdiv>\n    <div style=\"display:flex; flex-wrap:wrap;\">\n      <sc-for list=\"{{ vowels }}\" as=\"g\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:10px; width:105px;\">\n          <svg viewBox=\"0 0 100 100\" width=\"62\" height=\"62\" style=\"overflow:visible;\">\n            <g fill=\"none\" stroke=\"#b5562a\" stroke-width=\"{{ weight }}\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ g.d }}\"><\u002Fpath><\u002Fg>\n          <\u002Fsvg>\n          <span style=\"font-family:'Space Mono',monospace; font-size:12px; color:#a79d8e;\">{{ g.lab }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 02 FEATURAL -->\n  <div style=\"margin-top:50px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:8px;\">\n      <span style=\"font-size:12.5px; font-weight:600; letter-spacing:2.5px;\">02 — LA LOGIQUE FEATURAL DES VOYELLES<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:#ddd5c6;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-size:12.5px; color:#a79d8e; max-width:760px; margin-bottom:24px; line-height:1.6;\">La forme encode le son. Toutes les voyelles partagent le même axe vertical ; seul le tic change — côté, nombre, symétrie. On apprend six glyphes en apprenant une seule règle.<\u002Fdiv>\n\n    <div style=\"display:flex; gap:18px;\">\n      <sc-for list=\"{{ featural }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <div style=\"flex:1; background:#ece4d4; border:1px solid #ddd5c6; padding:18px 14px 16px; display:flex; flex-direction:column; align-items:center; gap:12px;\">\n          <svg viewBox=\"0 0 100 100\" width=\"58\" height=\"58\" style=\"overflow:visible;\">\n            <line x1=\"50\" y1=\"10\" x2=\"50\" y2=\"90\" stroke=\"#ddd5c6\" stroke-width=\"1\" stroke-dasharray=\"3 4\" opacity=\"{{ gridOpacity }}\"><\u002Fline>\n            <g fill=\"none\" stroke=\"#b5562a\" stroke-width=\"{{ weight }}\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ f.d }}\"><\u002Fpath><\u002Fg>\n          <\u002Fsvg>\n          <div style=\"text-align:center;\">\n            <div style=\"font-family:'Space Mono',monospace; font-size:13px; color:#1c1813; font-weight:700;\">{{ f.lab }}<\u002Fdiv>\n            <div style=\"font-size:10.5px; color:#a79d8e; margin-top:5px; line-height:1.4;\">{{ f.note }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 03 GRAMMAIRE DU BLOC -->\n  <div style=\"margin-top:50px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:8px;\">\n      <span style=\"font-size:12.5px; font-weight:600; letter-spacing:2.5px;\">03 — LA GRAMMAIRE DU CARRÉ<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:#ddd5c6;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-size:12.5px; color:#a79d8e; max-width:780px; margin-bottom:26px; line-height:1.6;\">Les lettres ne s'alignent pas : elles s'imbriquent dans un carré, comme un sinogramme. Les traits se touchent et se croisent — la consonne finale remonte dans le corps du bloc.<\u002Fdiv>\n\n    <div style=\"display:flex; gap:30px;\">\n      <sc-for list=\"{{ grammar }}\" as=\"gr\" hint-placeholder-count=\"3\">\n        <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:16px;\">\n          <svg viewBox=\"0 0 120 120\" width=\"150\" height=\"150\" style=\"overflow:visible;\">\n            <g opacity=\"{{ gridOpacity }}\"><rect x=\"4\" y=\"4\" width=\"112\" height=\"112\" fill=\"none\" stroke=\"#ddd5c6\" stroke-width=\"1.2\"><\u002Frect><\u002Fg>\n            <g fill=\"none\" stroke=\"#1c1813\" stroke-width=\"{{ weight }}\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <sc-for list=\"{{ gr.paths }}\" as=\"p\" hint-placeholder-count=\"2\">\n                <g transform=\"{{ p.t }}\"><path d=\"{{ p.d }}\"><\u002Fpath><\u002Fg>\n              <\u002Fsc-for>\n            <\u002Fg>\n          <\u002Fsvg>\n          <div style=\"text-align:center;\"><div style=\"font-family:'Space Mono',monospace; font-size:13px; font-weight:700;\">{{ gr.lab }}<\u002Fdiv><div style=\"font-size:11px; color:#a79d8e; margin-top:4px;\">{{ gr.note }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 04 MOT COMPOSÉ -->\n  <div style=\"margin-top:50px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:8px;\">\n      <span style=\"font-size:12.5px; font-weight:600; letter-spacing:2.5px;\">04 — UN MOT<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:#ddd5c6;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-size:12.5px; color:#a79d8e; margin-bottom:24px; line-height:1.6;\">Trois blocs, lus de gauche à droite : <span style=\"font-family:'Space Mono',monospace; color:#1c1813;\">po · la · ris<\u002Fspan> → <span style=\"font-family:'Space Mono',monospace; color:#1c1813;\">Polaris<\u002Fspan>.<\u002Fdiv>\n\n    <div style=\"display:flex; justify-content:center; align-items:flex-start; gap:20px; padding:14px 0;\">\n      <sc-for list=\"{{ wordPolaris }}\" as=\"b\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:12px;\">\n          <svg viewBox=\"0 0 120 120\" width=\"150\" height=\"150\" style=\"overflow:visible;\">\n            <g opacity=\"{{ gridOpacity }}\"><rect x=\"4\" y=\"4\" width=\"112\" height=\"112\" fill=\"none\" stroke=\"#ddd5c6\" stroke-width=\"1.2\"><\u002Frect><\u002Fg>\n            <g fill=\"none\" stroke=\"#1c1813\" stroke-width=\"{{ weight }}\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <sc-for list=\"{{ b.paths }}\" as=\"p\" hint-placeholder-count=\"2\">\n                <g transform=\"{{ p.t }}\"><path d=\"{{ p.d }}\"><\u002Fpath><\u002Fg>\n              <\u002Fsc-for>\n            <\u002Fg>\n          <\u002Fsvg>\n          <span style=\"font-family:'Space Mono',monospace; font-size:12px; color:#a79d8e;\">{{ b.lab }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 05 DEUX REGISTRES -->\n  <div style=\"margin-top:50px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:8px;\">\n      <span style=\"font-size:12.5px; font-weight:600; letter-spacing:2.5px;\">05 — UNE ÉCRITURE, DEUX MAINS<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:#ddd5c6;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-size:12.5px; color:#a79d8e; max-width:780px; margin-bottom:28px; line-height:1.6;\">Le même mot, deux registres. Le gravé pour l'administratif et les rapports d'archéo-num ; le pinceau pour le culte de l'Architecte et les inscriptions du Sanctuaire. Le froid des dômes contre le sacré.<\u002Fdiv>\n\n    <div style=\"display:flex; gap:24px;\">\n      <div style=\"flex:1; background:#ece4d4; border:1px solid #ddd5c6; padding:26px 20px 20px; opacity:{{ engravedOpacity }};\">\n        <div style=\"display:flex; justify-content:center; gap:6px;\">\n          <sc-for list=\"{{ wordPolaris }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <svg viewBox=\"0 0 120 120\" width=\"108\" height=\"108\" style=\"overflow:visible;\">\n              <g fill=\"none\" stroke=\"#2f6d7a\" stroke-width=\"8\" stroke-linecap=\"butt\" stroke-linejoin=\"miter\">\n                <sc-for list=\"{{ b.paths }}\" as=\"p\" hint-placeholder-count=\"2\">\n                  <g transform=\"{{ p.t }}\"><path d=\"{{ p.d }}\"><\u002Fpath><\u002Fg>\n                <\u002Fsc-for>\n              <\u002Fg>\n            <\u002Fsvg>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px; font-family:'Space Mono',monospace; font-size:11.5px; color:#2f6d7a; font-weight:700; letter-spacing:1px;\">GRAVÉ · OFFICIEL<\u002Fdiv>\n        <div style=\"font-size:11px; color:#a79d8e; margin-top:5px;\">traits secs, angles vifs, graisse égale<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1; background:#ece4d4; border:1px solid #ddd5c6; padding:26px 20px 20px; opacity:{{ brushOpacity }};\">\n        <div style=\"display:flex; justify-content:center; gap:6px;\">\n          <sc-for list=\"{{ wordPolaris }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <svg viewBox=\"0 0 120 120\" width=\"108\" height=\"108\" style=\"overflow:visible;\">\n              <g fill=\"none\" stroke=\"#b5562a\" stroke-width=\"15\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                <sc-for list=\"{{ b.paths }}\" as=\"p\" hint-placeholder-count=\"2\">\n                  <g transform=\"{{ p.t }}\"><path d=\"{{ p.d }}\"><\u002Fpath><\u002Fg>\n                <\u002Fsc-for>\n              <\u002Fg>\n            <\u002Fsvg>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px; font-family:'Space Mono',monospace; font-size:11.5px; color:#b5562a; font-weight:700; letter-spacing:1px;\">PINCEAU · RITUEL<\u002Fdiv>\n        <div style=\"font-size:11px; color:#a79d8e; margin-top:5px;\">attaques pressées, traits gonflés qui se lient<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:46px; padding-top:16px; border-top:1px solid #ddd5c6; display:flex; justify-content:space-between; font-family:'Space Mono',monospace; font-size:10.5px; color:#a79d8e;\">\n    <span>POLARIS · germe d'écriture · système assemblé<\u002Fspan>\n    <span>à casser ou valider<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1180, &quot;height&quot;: 1760 },\n  &quot;glyphWeight&quot;: { &quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 11, &quot;min&quot;: 5, &quot;max&quot;: 18, &quot;step&quot;: 0.5, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;blockGap&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 4, &quot;min&quot;: -16, &quot;max&quot;: 40, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;showConstruction&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Les deux&quot;, &quot;options&quot;: [&quot;Les deux&quot;, &quot;Gravé&quot;, &quot;Pinceau&quot;], &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { text: 'polaris' };\n\n  CONS = {\n    k: 'M30 18 V82 M30 50 L66 18 M30 50 L66 82',\n    t: 'M24 24 H76 M50 24 V82',\n    n: 'M30 18 V82 M70 18 V82 M30 50 H70',\n    s: 'M72 30 Q34 22 30 50 Q34 78 72 70',\n    l: 'M28 82 L46 22 H66 V82',\n    m: 'M38 82 V22 L50 52 L62 22 V82',\n    r: 'M30 82 V18 H58 Q74 18 74 35 Q74 52 34 52 M50 52 L72 82',\n    p: 'M30 82 V18 H60 Q74 18 74 34 Q74 50 60 50 H30',\n    g: 'M30 82 V18 H70',\n    x: 'M30 22 L70 78 M70 22 L30 78'\n  };\n  VOW = {\n    i: 'M50 16 V84',\n    a: 'M50 16 V84 M50 50 H78',\n    o: 'M50 16 V84 M50 50 H22',\n    e: 'M50 16 V84 M50 36 H78 M50 64 H78',\n    u: 'M16 50 H84 M50 50 V84',\n    y: 'M50 16 V84 M22 50 H50 M50 50 H78'\n  };\n  CMAP = { k:'k',c:'k',q:'k',g:'g',t:'t',d:'t',n:'n',m:'m',s:'s',z:'s',j:'s',l:'l',r:'r',p:'p',b:'p',f:'p',v:'p',x:'x',h:'x',w:'x' };\n  VMAP = { a:'a',e:'e',i:'i',o:'o',u:'u',y:'y' };\n  // horizontal ink extent of each glyph within its own 100-box (for tight side bearings)\n  EXT = {\n    k:[30,66], t:[24,76], n:[30,70], s:[30,72], l:[28,66], m:[38,62], r:[30,74], p:[30,74], g:[30,70], x:[30,70],\n    i:[44,56], a:[50,78], o:[22,50], e:[50,78], u:[16,84], y:[22,78]\n  };\n\n  syllabify(w) {\n    const seq = [];\n    for (const ch of w) {\n      if (this.VMAP[ch]) seq.push({ t: 'V', c: this.VMAP[ch] });\n      else if (this.CMAP[ch]) seq.push({ t: 'C', c: this.CMAP[ch] });\n    }\n    const sylls = []; let i = 0; let guard = 0;\n    while (i < seq.length && guard++ < 200) {\n      let onset = null, nucleus = null, coda = null;\n      if (seq[i] && seq[i].t === 'C') { onset = seq[i].c; i++; }\n      if (seq[i] && seq[i].t === 'V') {\n        nucleus = seq[i].c; i++;\n        if (seq[i] && seq[i].t === 'C') {\n          const nxt = seq[i + 1];\n          if (!nxt || nxt.t === 'C') { coda = seq[i].c; i++; }\n        }\n        sylls.push({ onset, nucleus, coda });\n      } else if (onset) {\n        sylls.push({ onset, nucleus: null, coda: null });\n      } else { i++; }\n    }\n    return sylls;\n  }\n\n  // Placement with deliberate overlap so strokes touch / cross — ideogram density.\n  // Each pushed item also carries its horizontal ink extent (x0,x1) so the block\n  // can be cropped to a tight, uniform advance width.\n  placeOne(o, n, k) {\n    const out = [];\n    const add = (key, isVowel, tx, ty, sx, sy) => {\n      const d = isVowel ? this.VOW[key] : this.CONS[key];\n      if (!d) return;\n      const e = this.EXT[key] || [0, 100];\n      const sgy = (sy == null) ? sx : sy;\n      const t = 'translate(' + tx + ',' + ty + ') scale(' + sx + (sgy !== sx ? (',' + sgy) : '') + ')';\n      out.push({ d, t, x0: tx + e[0] * sx, x1: tx + e[1] * sx });\n    };\n    const cD = o ? this.CONS[o] : null;\n    const vD = n ? this.VOW[n] : null;\n    const kD = k ? this.CONS[k] : null;\n    const horiz = n === 'u';\n    if (kD && horiz) {\n      // CVC with horizontal vowel: stack onset / vowel / coda, tightly overlapped\n      if (cD) add(o, false, 24, -10, 0.6);\n      add(n, true, 20, 30, 0.62);\n      add(k, false, 24, 62, 0.58);\n    } else if (kD) {\n      // CVC dense block (hangul model): onset top-left, coda bottom-left,\n      // vowel as a full-height column on the right that binds both.\n      if (cD) add(o, false, 0, -6, 0.66);\n      add(k, false, 0, 48, 0.66);\n      if (vD) add(n, true, 18, -16, 0.82, 1.46);\n    } else if (horiz) {\n      // horizontal-axis vowel (u): onset on top, vowel slides up under it\n      if (cD) add(o, false, 24, -6, 0.7);\n      add(n, true, 22, 40, 0.72);\n    } else if (cD && vD) {\n      // CV vertical: side by side, boxes overlapping so the vowel axis cuts into the consonant\n      add(o, false, 2, 8, 0.86);\n      add(n, true, 34, 8, 0.86);\n    } else if (vD) {\n      add(n, true, 20, 8, 0.86);\n    } else if (cD) {\n      add(o, false, 18, 8, 0.86);\n    }\n    return out;\n  }\n\n  // tight viewBox + advance width for a block, with a uniform side bearing\n  metrics(paths) {\n    let minX = Infinity, maxX = -Infinity;\n    paths.forEach(p => { if (p.x0 < minX) minX = p.x0; if (p.x1 > maxX) maxX = p.x1; });\n    if (!isFinite(minX)) { minX = 40; maxX = 80; }\n    const SB = 7;\n    const x = minX - SB, range = (maxX - minX) + 2 * SB;\n    return { vb: x + ' 0 ' + range + ' 120', w: Math.round(range * 100 / 120) };\n  }\n\n  compose(text) {\n    const out = [];\n    const words = String(text == null ? '' : text).toLowerCase().trim().split(/\\s+/);\n    words.forEach((w, wi) => {\n      if (!w) return;\n      if (wi > 0) out.push({ space: true });\n      this.syllabify(w).forEach(s => {\n        const paths = this.placeOne(s.onset, s.nucleus, s.coda);\n        const m = this.metrics(paths);\n        out.push({ space: false, paths, lab: (s.onset || '') + (s.nucleus || '') + (s.coda || ''), vb: m.vb, w: m.w });\n      });\n    });\n    return out;\n  }\n\n  renderVals() {\n    const weight = this.props.glyphWeight ?? 11;\n    const showConstruction = this.props.showConstruction ?? true;\n    const accent = this.props.accent ?? 'Les deux';\n    const blockGap = this.props.blockGap ?? 4;\n    const text = this.state.text ?? '';\n    return {\n      weight,\n      blockGap,\n      wordGap: blockGap + 26,\n      gridOpacity: showConstruction ? 1 : 0,\n      engravedOpacity: accent === 'Pinceau' ? 0.22 : 1,\n      brushOpacity: accent === 'Gravé' ? 0.22 : 1,\n      text,\n      onType: (e) => this.setState({ text: e.target.value }),\n      blocks: this.compose(text || ' '),\n      wordPolaris: this.compose('polaris'),\n      grammar: [\n        { lab: 'ka', note: 'voyelle verticale → imbriquée', paths: this.placeOne('k', 'a', null) },\n        { lab: 'tu', note: 'voyelle horizontale → empilée', paths: this.placeOne('t', 'u', null) },\n        { lab: 'nas', note: 'finale → remonte et croise', paths: this.placeOne('n', 'a', 's') }\n      ],\n      consonants: [\n        { d: this.CONS.k, lab: 'kə' }, { d: this.CONS.t, lab: 'tə' }, { d: this.CONS.n, lab: 'nə' },\n        { d: this.CONS.s, lab: 'sə' }, { d: this.CONS.l, lab: 'lə' }, { d: this.CONS.m, lab: 'mə' },\n        { d: this.CONS.r, lab: 'rə' }, { d: this.CONS.p, lab: 'pə' }, { d: this.CONS.g, lab: 'gə' },\n        { d: this.CONS.x, lab: 'xə' }\n      ],\n      vowels: [\n        { d: this.VOW.i, lab: 'i' }, { d: this.VOW.a, lab: 'a' }, { d: this.VOW.o, lab: 'o' },\n        { d: this.VOW.e, lab: 'e' }, { d: this.VOW.u, lab: 'u' }, { d: this.VOW.y, lab: 'y' }\n      ],\n      featural: [\n        { d: this.VOW.i, lab: 'i', note: 'axe nu' },\n        { d: this.VOW.a, lab: 'a', note: 'tic à droite' },\n        { d: this.VOW.o, lab: 'o', note: 'tic à gauche' },\n        { d: this.VOW.e, lab: 'e', note: 'double tic droit' },\n        { d: this.VOW.y, lab: 'y', note: 'tic des deux côtés' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
